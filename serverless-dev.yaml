service: flightsSearch
frameworkVersion: "3"

custom:
  serverlessSsmFetch:
    USERNAME: /provesio/username~true
    PASSWORD: /provesio/password~true
    COMPANY_CODE: /provesio/companycode~true
    X_API_KEY: /provesio/xapikey~true
    BASE_URL: /provesio/baseurl~true
    COGNITO_CLIENT_ID: /provesio/cognitouserid~true
    GUEST_JWT_SECRET: /provesio/jwtguestsecret~true
    COGNITO_USERPOOL_ID: /provesio/cognitouserpoolid~true
    MAIN_ENDPOINT: /provesio/mainEndpoint
  prune:
    automatic: true
    number: 3

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  stage: ${opt:stage, 'dev2'}

  vpc:
    securityGroupIds:
    - !Ref LambdaSecurityGroup
    subnetIds:
    - subnet-025cd3d6f9357cc16
    - subnet-0db7e348636b19ee6
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
        - sqs:SendMessage
        Resource:
        - arn:aws:sqs:${aws:region}:${aws:accountId}:add-log-queue-dev
        - arn:aws:sqs:${aws:region}:${aws:accountId}:async-booking-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:update-expired-booking-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:ingest-high-demand-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:people-viewing-flights-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:invoke-email-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:async-prov-booking-queue-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:send-email-notification-${self:provider.stage}
        - arn:aws:sqs:${aws:region}:${aws:accountId}:user-search-preferences-queue-dev
        - arn:aws:sqs:${aws:region}:${aws:accountId}:flight-search-operation-queue-${self:provider.stage}


      - Effect: Allow
        Action:
        - s3:PutObject
        - s3:PutObjectAcl
        - s3:PutObjectTagging # ← REQUIRED
        Resource:
        - arn:aws:s3:::log-trace-${self:provider.stage}/*
        - arn:aws:s3:::booked-ticket-${self:provider.stage}/*

      - Effect: Allow
        Action:
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:GetItem
        - dynamodb:Scan
        - dynamodb:Query
        Resource:
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/prov-booking-${self:provider.stage}
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/flight-booking-${self:provider.stage}
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/logtrace-dev
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/logtrace-dev/index/GSI_Offer_Step
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/high-demand-flight-indicators-${self:provider.stage}
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/users-dev
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/people-viewing-flights-${self:provider.stage}
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/offer-viewing-${self:provider.stage}
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/countries-listing-dev
        - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/countries-listing-dev/index/GSI_IATA_CODE

  environment:
    META_SYNC_LISTING_TABLE: meta-sync-listing-${self:provider.stage}
    STAGE: ${self:provider.stage}
    USERNAME: ${self:custom.serverlessSsmFetch.USERNAME}
    PASSWORD: "${self:custom.serverlessSsmFetch.PASSWORD}"
    COMPANY_CODE: ${self:custom.serverlessSsmFetch.COMPANY_CODE}
    X_API_KEY: ${self:custom.serverlessSsmFetch.X_API_KEY}
    BASE_URL: ${self:custom.serverlessSsmFetch.BASE_URL}
    REDIS_HOST: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
    REDIS_PORT: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
    COGNITO_CLIENT_ID: ${self:custom.serverlessSsmFetch.COGNITO_CLIENT_ID}
    GUEST_JWT_SECRET: ${self:custom.serverlessSsmFetch.GUEST_JWT_SECRET}
    GUEST_TOKEN_TTL: "3600"
    COGNITO_USERPOOL_ID: ${self:custom.serverlessSsmFetch.COGNITO_USERPOOL_ID}
    COGNITO_REGION: eu-west-1
    LOG_TRACE_SQS: https://sqs.${aws:region}.amazonaws.com/648485682397/add-log-queue-dev
    LOG_TRACE_BUCKET: log-trace-${self:provider.stage}
    PROV_BOOKING_TABLE: prov-booking-${self:provider.stage}
    ASYNC_BOOKING_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/async-booking-queue-${self:provider.stage}
    FLIGHT_BOOKING_TABLE: flight-booking-${self:provider.stage}
    MAIN_ENDPOINT: ${self:custom.serverlessSsmFetch.MAIN_ENDPOINT}
    UPDATE_EXIRED_BOOKING: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/update-expired-booking-queue-${self:provider.stage}
    LOG_TRACE_TABLE: logtrace-dev
    HIGH_DEMAND_INDICATOR_TABLE: high-demand-flight-indicators-${self:provider.stage}
    HIGH_DEMAND_BOOKING_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/ingest-high-demand-queue-${self:provider.stage}
    BOOKED_TICKET_BUCKET: booked-ticket-${self:provider.stage}
    USERS_TABLE: users-dev
    PEOPLE_VIEWING_FLIGHTS_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/people-viewing-flights-queue-${self:provider.stage}
    PEOPLE_VIEWING_TABLE: people-viewing-flights-${self:provider.stage}
    OFFER_VIEWING_TABLE : offer-viewing-${self:provider.stage}
    PEOPLE_VIEWING_TTL: 10
    INVOKE_EMAIL_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/invoke-email-queue-${self:provider.stage}
    COUNTRIES_LISTING_TABLE: countries-listing-dev
    ASYNC_PROV_BOOKING_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/async-prov-booking-queue-${self:provider.stage}
    SEND_EMAIL_QUEUE : https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/send-email-notification-dev
    USER_SEARCH_PREFERENCES_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/user-search-preferences-queue-dev
    FLIGHT_SEARCH_OPERATION_QUEUE: https://sqs.${aws:region}.amazonaws.com/${aws:accountId}/flight-search-operation-queue-${self:provider.stage}
    CACHE_TTL_DEFAUL: 180
    REGION: eu-west-1

package:
  patterns:
  - '!./**' # 1. EXCLUDE EVERYTHING in the current directory

  # 2. INCLUDE ALL SOURCE CODE AND CONFIG FILES
  - handlers/** # Your Lambda handler files
  - helper/** # Your utility/shared helper code
  - lib/** # Your library code
  - package.json # Required for dependency resolution
  - package-lock.json # Highly recommended for predictable deployments
  - .env # If your function needs to read this at runtime

  # 3. INCLUDE ALL PRODUCTION DEPENDENCIES
  - node_modules/** # All production dependencies

  # 4. EXCLUSIONS (Cleanup)
  - '!node_modules/aws-sdk/**' # Exclude AWS SDK (provided by Lambda runtime)
  - '!node_modules/**/test/**' # Exclude test folders/files
  - '!node_modules/**/tests/**'
  - '!node_modules/**/docs/**'
  - '!node_modules/**/examples/**'
  - '!node_modules/**/*.md' # Exclude Markdown files
  - '!node_modules/**/*.ts' # Exclude TypeScript source files
  - '!node_modules/**/*.map' # Exclude source maps
  excludeDevDependencies: true # Automatically excludes devDependencies listed in package.json

