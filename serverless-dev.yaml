resources:
  Resources:

    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Security group for Lambda
        VpcId: vpc-0622a975b106604e0
        SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

    RedisSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Allow Lambda to access Redis
        VpcId: vpc-0622a975b106604e0
        SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
        SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

    ###########################
    ### NAT + Private Routes
    ###########################

    NatEIP:
      Type: AWS::EC2::EIP
      Properties:
        Domain: vpc

    NatGateway:
      Type: AWS::EC2::NatGateway
      Properties:
        AllocationId: !GetAtt NatEIP.AllocationId
        SubnetId: subnet-04c7081fd81c6e637 # PUBLIC subnet
        Tags:
        - Key: Name
          Value: flightSearch-NAT

    PrivateSubnetRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: vpc-0622a975b106604e0

    PrivateSubnetRoute:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateSubnetRouteTable
        DestinationCidrBlock: 0.0.0.0/0
        NatGatewayId: !Ref NatGateway

    PrivateSubnet1RouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        RouteTableId: !Ref PrivateSubnetRouteTable
        SubnetId: subnet-025cd3d6f9357cc16

    PrivateSubnet2RouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        RouteTableId: !Ref PrivateSubnetRouteTable
        SubnetId: subnet-0db7e348636b19ee6

    ###########################
    ### REDIS (ElastiCache)
    ###########################

    RedisSubnetGroup:
      Type: AWS::ElastiCache::SubnetGroup
      Properties:
        CacheSubnetGroupName: redis-subnet-group-${self:provider.stage}
        Description: Subnet group for Redis
        SubnetIds:
        - subnet-025cd3d6f9357cc16
        - subnet-0db7e348636b19ee6

    RedisReplicationGroup:
      Type: AWS::ElastiCache::ReplicationGroup
      Properties:
        ReplicationGroupId: redis-rg-${self:provider.stage}
        ReplicationGroupDescription: "Redis for ${self:provider.stage}"
        Engine: redis
        EngineVersion: "7.0"
        CacheNodeType: cache.t3.micro
        NumNodeGroups: 1
        ReplicasPerNodeGroup: 0
        AutomaticFailoverEnabled: false
        TransitEncryptionEnabled: false
        AtRestEncryptionEnabled: false
        SecurityGroupIds:
        - !Ref RedisSecurityGroup
        CacheSubnetGroupName: !Ref RedisSubnetGroup

    LogTraceBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: log-trace-${self:provider.stage}
        LifecycleConfiguration:
          Rules:
          - Id: DeleteAfter1Day
            Status: Enabled
            ExpirationInDays: 1

    BookedTicket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: booked-ticket-${self:provider.stage}
        LifecycleConfiguration:
          Rules:
          - Id: DeleteAfter1Day
            Status: Enabled
            ExpirationInDays: 1

    ProvBookingTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: prov-booking-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
        - AttributeName: offerId
          AttributeType: S
        KeySchema:
        - AttributeName: offerId
          KeyType: HASH # Partition Key

    FlightBookingTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: flight-booking-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
        - AttributeName: bookingReferenceId
          AttributeType: S
        KeySchema:
        - AttributeName: bookingReferenceId
          KeyType: HASH

    HighDemandIndicatorsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: high-demand-flight-indicators-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST

        AttributeDefinitions:
        - AttributeName: departureAirportCode
          AttributeType: S
        - AttributeName: routeAirline
          AttributeType: S

        KeySchema:
        - AttributeName: departureAirportCode
          KeyType: HASH
        - AttributeName: routeAirline
          KeyType: RANGE

    PeopleViewingFlightsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: people-viewing-flights-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST

        AttributeDefinitions:
          - AttributeName: route
            AttributeType: S
          - AttributeName: cabinClass
            AttributeType: S

        KeySchema:
          - AttributeName: route
            KeyType: HASH
          - AttributeName: cabinClass
            KeyType: RANGE

        SSESpecification:
          SSEEnabled: true

        TimeToLiveSpecification:
          AttributeName: expireAt
          Enabled: true  

    OfferViewingTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: offer-viewing-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST

        AttributeDefinitions:
          - AttributeName: offerId
            AttributeType: S

        KeySchema:
          - AttributeName: offerId
            KeyType: HASH

        SSESpecification:
          SSEEnabled: true

        TimeToLiveSpecification:
          AttributeName: expireAt
          Enabled: true

    AsyncBookingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: async-booking-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ AsyncBookingDLQ, Arn ]
          maxReceiveCount: 5

    AsyncBookingDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: async-booking-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days

    InvokeEmailQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: invoke-email-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ InvokeEmailDLQ, Arn ]
          maxReceiveCount: 5

    InvokeEmailDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: invoke-email-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days    

    peopleViewingFlightsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: people-viewing-flights-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ peopleViewingFlightsDLQ, Arn ]
          maxReceiveCount: 5

    peopleViewingFlightsDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: people-viewing-flights-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days    

    IngestHighDemandIndicatorQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ingest-high-demand-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ IngestHighDemandIndicatorDLQ, Arn ]
          maxReceiveCount: 5

    IngestHighDemandIndicatorDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ingest-high-demand-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days         

    updateExpiredBooking:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: update-expired-booking-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ updateExpiredBookingDLQ, Arn ]
          maxReceiveCount: 5

    updateExpiredBookingDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: update-expired-booking-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days      

    AsyncProvBookingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: async-prov-booking-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ AsyncProvBookingDLQ, Arn ]
          maxReceiveCount: 5

    AsyncProvBookingDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: async-prov-booking-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days 

    FlightSearchOperationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: flight-search-operation-queue-${self:provider.stage}
        VisibilityTimeout: 300 # Worker has 2 min to process
        MessageRetentionPeriod: 86400 # 1 day retention
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [ FlightSearchOperationDLQ, Arn ]
          maxReceiveCount: 5

    FlightSearchOperationDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: flight-search-operation-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # 14 days                     

  Outputs:
    RedisPrimaryEndpoint:
      Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
      Export:
        Name: redis-primary-endpoint-dev

    RedisPrimaryPort:
